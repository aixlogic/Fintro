# Netlify Konfiguration
# Diese Datei muss normalerweise nicht geändert werden.

[build]
  # Kein Build-Command nötig - wir liefern fertige HTML-Dateien
  publish = "."

# Sicherheits-Header
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Schöne 404-Seite (optional - wenn du eine 404.html erstellst)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

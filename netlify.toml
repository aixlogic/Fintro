# netlify.toml — Fintro deployment config

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Root URL serves the landing page
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

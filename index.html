// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let state = JSON.parse(localStorage.getItem('fintro_state') || 'null') || {
  xp: 0,
  completedChapters: [],
  streak: 1,
};

let currentChapter = null;
let currentTab = 'lesson';
let quizState = { index: 0, score: 0, answered: false, done: false };

function saveState() {
  localStorage.setItem('fintro_state', JSON.stringify(state));
}

// ════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  showScreen('home-screen');
  renderHome();
}

function openChapter(chapterId) {
  const ch = CHAPTERS.find(c => c.id === chapterId);
  if (!ch) return;

  // Check if locked
  const idx = CHAPTERS.indexOf(ch);
  if (idx > 0 && !state.completedChapters.includes(CHAPTERS[idx - 1].id)) return;

  currentChapter = ch;
  quizState = { index: 0, score: 0, answered: false, done: false };

  document.getElementById('ch-meta').textContent = `UNIT 1 · CHAPTER ${ch.id}`;
  document.getElementById('ch-title').textContent = ch.title;
  document.getElementById('ch-subtitle').textContent = ch.subtitle;

  switchTab('lesson', document.querySelector('.tab-btn'));
  renderLesson();
  showScreen('chapter-screen');
}

// ════════════════════════════════════════
// HOME RENDER
// ════════════════════════════════════════
function renderHome() {
  // XP bar
  const maxXP = 500;
  const pct = Math.min((state.xp / maxXP) * 100, 100);
  document.getElementById('xp-fill').style.width = pct + '%';
  document.getElementById('xp-count').textContent = `${state.xp} / ${maxXP}`;

  // Stats
  document.getElementById('stat-chapters').textContent = state.completedChapters.length;
  document.getElementById('stat-xp').textContent = state.xp;
  document.getElementById('stat-streak').textContent = state.streak + '🔥';

  // Chapter list
  const list = document.getElementById('chapter-list');
  list.innerHTML = '';

  CHAPTERS.forEach((ch, idx) => {
    const isCompleted = state.completedChapters.includes(ch.id);
    const isLocked = idx > 0 && !state.completedChapters.includes(CHAPTERS[idx - 1].id);
    const isActive = !isLocked && !isCompleted;

    const row = document.createElement('div');
    row.className = `chapter-row${isLocked ? ' locked' : ''}${isCompleted ? ' completed' : ''}`;
    if (!isLocked) row.onclick = () => openChapter(ch.id);

    let badge = '';
    if (isLocked)     badge = `<span class="ch-badge">🔒 Locked</span>`;
    else if (isCompleted) badge = `<span class="ch-badge done">✓ Done</span>`;
    else              badge = `<span class="ch-badge active">▶ Start</span>`;

    row.innerHTML = `
      <span class="ch-num">0${ch.id}</span>
      <div class="ch-info">
        <div class="ch-title">${ch.title}</div>
        <div class="ch-sub">${ch.subtitle}</div>
      </div>
      <span class="ch-xp" style="font-size:0.75rem;color:var(--amber);font-weight:700;white-space:nowrap;">+${ch.xpReward} XP</span>
      ${badge}
    `;
    list.appendChild(row);
  });
}

// ════════════════════════════════════════
// TAB SWITCHING
// ════════════════════════════════════════
function switchTab(name, btn) {
  currentTab = name;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');

  if (name === 'lesson') renderLesson();
  if (name === 'vocab')  renderVocab();
  if (name === 'quiz')   renderQuiz();
  if (name === 'game')   renderGame();
}

// ════════════════════════════════════════
// LESSON
// ════════════════════════════════════════
function renderLesson() {
  document.getElementById('lesson-content').innerHTML = currentChapter.lesson;
}

// ════════════════════════════════════════
// VOCAB
// ════════════════════════════════════════
function renderVocab() {
  const grid = document.getElementById('vocab-grid');
  grid.innerHTML = '';
  currentChapter.vocab.forEach(v => {
    const card = document.createElement('div');
    card.className = 'vocab-card';
    card.innerHTML = `<div class="term">${v.term}</div><div class="def" style="display:none">${v.def}</div>`;
    card.onclick = () => {
      const def = card.querySelector('.def');
      def.style.display = def.style.display === 'none' ? 'block' : 'none';
    };
    grid.appendChild(card);
  });
}

// ════════════════════════════════════════
// QUIZ
// ════════════════════════════════════════
function renderQuiz() {
  const wrap = document.getElementById('quiz-wrap');
  const qs = currentChapter.quiz;

  if (quizState.done) {
    const pct = Math.round((quizState.score / qs.length) * 100);
    wrap.innerHTML = `
      <div class="quiz-result">
        <span class="score-big">${quizState.score}/${qs.length}</span>
        <h3 style="margin-bottom:0.5rem">${pct >= 80 ? '🎉 Great work!' : pct >= 60 ? '👍 Good effort!' : '💪 Keep practicing!'}</h3>
        <p>${pct >= 80 ? 'You really understand this chapter.' : 'Review the lesson and try again!'}</p>
        <button class="btn-primary" onclick="unlockAfterQuiz()">Continue to Game →</button>
        ${pct < 80 ? `<br><br><button class="btn-primary" onclick="resetQuiz()" style="background:var(--surface2);color:var(--text);margin-top:0.5rem">Retry Quiz</button>` : ''}
      </div>`;
    return;
  }

  const q = qs[quizState.index];

  // Dots
  let dots = '';
  qs.forEach((_, i) => {
    const cls = i < quizState.index ? 'done' : i === quizState.index ? 'current' : '';
    dots += `<div class="quiz-dot ${cls}"></div>`;
  });

  wrap.innerHTML = `
    <div class="quiz-progress">
      <div class="quiz-dots">${dots}</div>
      <span style="font-size:0.8rem;color:var(--muted)">${quizState.index + 1} of ${qs.length}</span>
    </div>
    <div class="quiz-question-box">
      <div class="quiz-q-num">QUESTION ${quizState.index + 1}</div>
      <div class="quiz-q-text">${q.q}</div>
    </div>
    <div class="quiz-options" id="quiz-options">
      ${q.options.map((o, i) => `<button class="quiz-option" onclick="answerQuiz(${i})">${o}</button>`).join('')}
    </div>
    <div id="quiz-feedback"></div>
    <button class="btn-primary" id="quiz-next" style="display:none" onclick="nextQuestion()">Next →</button>
  `;
}

function answerQuiz(idx) {
  if (quizState.answered) return;
  quizState.answered = true;

  const q = currentChapter.quiz[quizState.index];
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach(o => o.disabled = true);
  opts[idx].classList.add(idx === q.correct ? 'correct' : 'wrong');
  opts[q.correct].classList.add('correct');

  const fb = document.getElementById('quiz-feedback');
  const correct = idx === q.correct;
  if (correct) quizState.score++;
  fb.className = `quiz-feedback ${correct ? 'correct' : 'wrong'}`;
  fb.innerHTML = `${correct ? '✓ Correct!' : '✗ Not quite.'} ${q.explain}`;

  document.getElementById('quiz-next').style.display = 'block';
}

function nextQuestion() {
  quizState.index++;
  quizState.answered = false;
  if (quizState.index >= currentChapter.quiz.length) {
    quizState.done = true;
    awardXP(currentChapter.xpReward);
    if (!state.completedChapters.includes(currentChapter.id)) {
      state.completedChapters.push(currentChapter.id);
      saveState();
    }
  }
  renderQuiz();
}

function resetQuiz() {
  quizState = { index: 0, score: 0, answered: false, done: false };
  renderQuiz();
}

function unlockAfterQuiz() {
  switchTab('game', document.querySelectorAll('.tab-btn')[3]);
}

// ════════════════════════════════════════
// XP
// ════════════════════════════════════════
function awardXP(amount) {
  state.xp += amount;
  saveState();
  const toast = document.getElementById('xp-toast');
  toast.textContent = `+${amount} XP 🎉`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}

  if (currentChapter.game === 'incomestreams') initIncomeStreams();
}

        <div class="barter-col">
          <h4>Alice has</h4>
          ${BARTER_ITEMS.alice.map((it, i) => `<div class="barter-item" id="alice-${i}" onclick="selectBarter('alice',${i})">${it.name} <small style="color:var(--muted)">(val: ${it.value})</small></div>`).join('')}
        </div>
        <div class="barter-arrow">⇄</div>
        <div class="barter-col">
          <h4>Bob has</h4>
          ${BARTER_ITEMS.bob.map((it, i) => `<div class="barter-item" id="bob-${i}" onclick="selectBarter('bob',${i})">${it.name} <small style="color:var(--muted)">(val: ${it.value})</small></div>`).join('')}
        </div>
      </div>
      <div class="barter-log" id="barter-log">Select one item from each side to attempt a trade...</div>
      <button class="btn-primary" onclick="attemptTrade()" style="margin-top:0.75rem">Attempt Trade</button>
    </div>`;
}

function selectBarter(who, idx) {
  barterSelected[who] = idx;
  document.querySelectorAll(`.barter-col`).forEach(col => {
    col.querySelectorAll('.barter-item').forEach(el => el.classList.remove('selected'));
  });
  // Highlight selected in each column
  BARTER_ITEMS.alice.forEach((_, i) => {
    const el = document.getElementById(`alice-${i}`);
    if (el && barterSelected.alice === i) el.classList.add('selected');
  });
  BARTER_ITEMS.bob.forEach((_, i) => {
    const el = document.getElementById(`bob-${i}`);
    if (el && barterSelected.bob === i) el.classList.add('selected');
  });
}

function attemptTrade() {
  const log = document.getElementById('barter-log');
  if (barterSelected.alice === null || barterSelected.bob === null) {
    log.textContent = '⚠️ Select one item from each side first!';
    return;
  }
  const a = BARTER_ITEMS.alice[barterSelected.alice];
  const b = BARTER_ITEMS.bob[barterSelected.bob];
  const diff = Math.abs(a.value - b.value);
  if (diff <= 2) {
    barterScore++;
    document.getElementById('barter-score').textContent = barterScore;
    log.innerHTML = `✅ Trade successful! ${a.name} ↔ ${b.name} (values: ${a.value} vs ${b.value}). Close enough! 🎉`;
  } else {
    log.innerHTML = `❌ Trade failed. ${a.name} (val: ${a.value}) vs ${b.name} (val: ${b.value}) — too far apart. Neither side agrees it's fair.`;
  }
  barterSelected = { alice: null, bob: null };
  document.querySelectorAll('.barter-item').forEach(el => el.classList.remove('selected'));
}

// ─── GAME 2: Time Machine (Compound Interest) ───
function timeMachineHTML() {
  return `
    <div class="game-wrap">
      <div class="game-title">⏱ Time Machine</div>
      <div class="game-desc">Drag the sliders to see how compound interest grows your money over time.</div>
      <div class="tm-controls">
        <div class="tm-control">
          <label>Starting amount: <span class="tm-val" id="tm-principal-val">$1,000</span></label>
          <input type="range" id="tm-principal" min="100" max="10000" step="100" value="1000" oninput="updateTM()">
        </div>
        <div class="tm-control">
          <label>Annual interest rate: <span class="tm-val" id="tm-rate-val">7%</span></label>
          <input type="range" id="tm-rate" min="1" max="20" step="1" value="7" oninput="updateTM()">
        </div>
        <div class="tm-control">
          <label>Years: <span class="tm-val" id="tm-years-val">20</span></label>
          <input type="range" id="tm-years" min="1" max="50" step="1" value="20" oninput="updateTM()">
        </div>
        <div class="tm-control">
          <label>Monthly contribution: <span class="tm-val" id="tm-contrib-val">$50</span></label>
          <input type="range" id="tm-contrib" min="0" max="500" step="10" value="50" oninput="updateTM()">
        </div>
      </div>
      <canvas class="tm-chart" id="tm-canvas"></canvas>
      <div class="tm-summary" id="tm-summary"></div>
    </div>`;
}

function initTimeMachine() { updateTM(); }

function updateTM() {
  const P = +document.getElementById('tm-principal').value;
  const r = +document.getElementById('tm-rate').value / 100;
  const t = +document.getElementById('tm-years').value;
  const contrib = +document.getElementById('tm-contrib').value;

  document.getElementById('tm-principal-val').textContent = '$' + P.toLocaleString();
  document.getElementById('tm-rate-val').textContent = (r * 100).toFixed(0) + '%';
  document.getElementById('tm-years-val').textContent = t;
  document.getElementById('tm-contrib-val').textContent = '$' + contrib;

  // Calculate year-by-year
  const years = [], amounts = [], invested = [];
  let total = P;
  let totalInvested = P;
  for (let y = 0; y <= t; y++) {
    years.push(y);
    amounts.push(Math.round(total));
    invested.push(Math.round(totalInvested));
    total = total * (1 + r) + contrib * 12;
    totalInvested += contrib * 12;
  }

  drawTMChart(years, amounts, invested);

  const finalAmount = amounts[amounts.length - 1];
  const finalInvested = invested[invested.length - 1];
  const gain = finalAmount - finalInvested;

  document.getElementById('tm-summary').innerHTML = `
    <div class="tm-stat"><span>Final balance</span><strong>$${finalAmount.toLocaleString()}</strong></div>
    <div class="tm-stat"><span>Total invested</span><strong style="color:var(--blue)">$${finalInvested.toLocaleString()}</strong></div>
    <div class="tm-stat"><span>Interest earned</span><strong>$${gain.toLocaleString()}</strong></div>
  `;
}

function drawTMChart(years, amounts, invested) {
  const canvas = document.getElementById('tm-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  const W = canvas.width, H = canvas.height;
  const pad = { top: 16, right: 16, bottom: 32, left: 60 };

  const maxVal = Math.max(...amounts);
  const scaleY = v => H - pad.bottom - ((v / maxVal) * (H - pad.top - pad.bottom));
  const scaleX = i => pad.left + (i / (years.length - 1)) * (W - pad.left - pad.right);

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (i / 4) * (H - pad.top - pad.bottom);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    const val = maxVal * (1 - i / 4);
    ctx.fillStyle = '#64748b';
    ctx.font = '10px Syne, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('$' + Math.round(val).toLocaleString(), pad.left - 6, y + 4);
  }

  // Invested area
  ctx.beginPath();
  ctx.moveTo(scaleX(0), scaleY(invested[0]));
  invested.forEach((v, i) => ctx.lineTo(scaleX(i), scaleY(v)));
  ctx.lineTo(scaleX(years.length - 1), H - pad.bottom);
  ctx.lineTo(scaleX(0), H - pad.bottom);
  ctx.closePath();
  ctx.fillStyle = '#3b82f620';
  ctx.fill();

  // Compound area
  ctx.beginPath();
  ctx.moveTo(scaleX(0), scaleY(amounts[0]));
  amounts.forEach((v, i) => ctx.lineTo(scaleX(i), scaleY(v)));
  ctx.lineTo(scaleX(years.length - 1), H - pad.bottom);
  ctx.lineTo(scaleX(0), H - pad.bottom);
  ctx.closePath();
  ctx.fillStyle = '#22c55e22';
  ctx.fill();

  // Compound line
  ctx.beginPath();
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 2.5;
  amounts.forEach((v, i) => i === 0 ? ctx.moveTo(scaleX(i), scaleY(v)) : ctx.lineTo(scaleX(i), scaleY(v)));
  ctx.stroke();

  // Invested line
  ctx.beginPath();
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  invested.forEach((v, i) => i === 0 ? ctx.moveTo(scaleX(i), scaleY(v)) : ctx.lineTo(scaleX(i), scaleY(v)));
  ctx.stroke();
  ctx.setLineDash([]);

  // X axis labels
  ctx.fillStyle = '#64748b';
  ctx.font = '10px Syne, sans-serif';
  ctx.textAlign = 'center';
  const step = Math.ceil(years.length / 5);
  years.forEach((y, i) => {
    if (i % step === 0 || i === years.length - 1) {
      ctx.fillText('yr ' + y, scaleX(i), H - 8);
    }
  });
}

// ─── GAME 3: Income Streams ───────────────
const INCOME_SOURCES = [
  { emoji: "💼", name: "Part-time Job", earn: 600, type: "active" },
  { emoji: "🎨", name: "Freelance Design", earn: 400, type: "active" },
  { emoji: "📹", name: "YouTube Channel", earn: 120, type: "passive" },
  { emoji: "📚", name: "Sell an eBook", earn: 80, type: "passive" },
  { emoji: "🏠", name: "Rent a Room", earn: 500, type: "passive" },
  { emoji: "📈", name: "Dividend Stocks", earn: 60, type: "passive" },
];

let incomeActive = new Set();

function incomeStreamsHTML() {
  return `
    <div class="game-wrap">
      <div class="game-title">💰 Income Builder</div>
      <div class="game-desc">Click income sources to activate them. Build your monthly portfolio — spot which are active vs passive!</div>
      <div class="income-grid" id="income-grid"></div>
      <div class="income-total">
        <div>
          <div class="lbl">Monthly income</div>
          <div style="font-size:0.72rem;color:var(--muted);margin-top:2px" id="income-breakdown"></div>
        </div>
        <div class="amount" id="income-total">$0/mo</div>
      </div>
    </div>`;
}

function initIncomeStreams() {
  incomeActive = new Set();
  renderIncomeGrid();
}

function renderIncomeGrid() {
  const grid = document.getElementById('income-grid');
  if (!grid) return;
  grid.innerHTML = '';
  INCOME_SOURCES.forEach((src, i) => {
    const card = document.createElement('div');
    card.className = `income-card${incomeActive.has(i) ? ' active' : ''}`;
    card.innerHTML = `
      <span class="ic-emoji">${src.emoji}</span>
      <div class="ic-name">${src.name}</div>
      <div class="ic-earn">+$${src.earn}/mo · ${src.type}</div>
    `;
    card.onclick = () => {
      if (incomeActive.has(i)) incomeActive.delete(i);
      else incomeActive.add(i);
      renderIncomeGrid();
      updateIncomeTotal();
    };
    grid.appendChild(card);
  });
  updateIncomeTotal();
}

function updateIncomeTotal() {
  let total = 0, activeAmt = 0, passiveAmt = 0;
  incomeActive.forEach(i => {
    const src = INCOME_SOURCES[i];
    total += src.earn;
    if (src.type === 'active') activeAmt += src.earn;
    else passiveAmt += src.earn;
  });
  const totalEl = document.getElementById('income-total');
  const breakEl = document.getElementById('income-breakdown');
  if (totalEl) totalEl.textContent = '$' + total + '/mo';
  if (breakEl) breakEl.textContent = incomeActive.size === 0
    ? 'Select sources above'
    : `Active: $${activeAmt} · Passive: $${passiveAmt}`;
}
